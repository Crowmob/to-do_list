version: "3.9"

services:
  app:
    env_file:
      - .env
    build: .
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    depends_on:
      - db 
  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_list
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
volumes:
  pgdata: